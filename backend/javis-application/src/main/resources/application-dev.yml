spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/javis
    username: javis
    password: javis123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

javis:
  storage:
    type: local
    local:
      base-path: ./uploads
  security:
    jwt:
      secret: javis-dev-secret-key-change-in-production-must-be-at-least-256-bits-long
      expiration: 86400000

embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key-here}
          base-url: https://api.deepseek.com
